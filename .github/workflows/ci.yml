name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs anteriores en la misma rama si llega uno nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  astro-site:
    name: astro-site (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/astro-site
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/astro-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint + prettier)
        run: npm run lint

      - name: Build
        run: npm run build

  python-coursework:
    name: python coursework (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest --no-header
