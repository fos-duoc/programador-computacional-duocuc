name: Deploy Astro a GitHub Pages

# REQUISITO: en GitHub repo settings → Pages → Source debe estar en
# "GitHub Actions" (no "Deploy from a branch"). Cambiar antes de mergear.

on:
  push:
    branches: [main]
    paths:
      - "apps/astro-site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Permisos mínimos requeridos por actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola deploy en curso a la vez; las nuevas esperan a que termine la actual
# (no cancelan, para no dejar el sitio en un estado intermedio).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build astro-site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/astro-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/astro-site

      - name: Build
        run: npm run build
        working-directory: apps/astro-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/astro-site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
