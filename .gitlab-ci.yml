# GitLab CI/CD — mirror de GitHub Pages a GitLab Pages
# Fuente de verdad: .github/workflows/deploy-pages.yml

image: node:20-alpine

pages:
  stage: deploy
  cache:
    key:
      files:
        - apps/astro-site/package-lock.json
    paths:
      - apps/astro-site/node_modules/
  before_script:
    - cd apps/astro-site
    - npm ci
  script:
    - npm run build
    - cd ../..
    - mkdir -p public
    - cp -r apps/astro-site/dist/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

variables:
  GIT_DEPTH: 1
